<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Skills Dashboard</title>
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Marked.js for parsing markdown in the browser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { font-weight: bold; margin-top: 1.5em; margin-bottom: 0.5em; }
        .markdown-body h1 { font-size: 1.5rem; color: #3b82f6; }
        .markdown-body h2 { font-size: 1.25rem; border-bottom: 1px solid #333; padding-bottom: 0.25rem; }
        .markdown-body p { margin-bottom: 1em; color: #ccc; line-height: 1.6; }
        .markdown-body ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1em; color: #bbb; }
        .markdown-body code { background-color: #222; padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; font-size: 0.9em; color: #3b82f6; }
        .markdown-body pre { background-color: #111; padding: 1rem; border-radius: 4px; overflow-x: auto; margin-bottom: 1em; border: 1px solid #333; }
        .markdown-body pre code { background-color: transparent; padding: 0; color: #e5e7eb; }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body class="h-screen flex flex-col md:flex-row overflow-hidden selection:bg-blue-500 selection:text-white">

    <!-- Sidebar: Skill List -->
    <aside class="w-full md:w-1/3 lg:w-1/4 h-1/3 md:h-full border-b md:border-b-0 md:border-r border-neutral-800 bg-neutral-950 flex flex-col">
        <div class="p-6 border-b border-neutral-800">
            <h1 class="text-xl font-bold uppercase tracking-widest text-white">Skills Dashboard</h1>
            <p class="text-xs text-neutral-500 mt-2" id="skill-count">Loading capabilities...</p>
        </div>
        
        <div class="p-4">
            <input type="text" id="search-bar" placeholder="Search skills..." class="w-full bg-neutral-900 border border-neutral-800 text-sm focus:outline-none focus:border-blue-500 px-4 py-2 text-white placeholder-neutral-500 transition-colors">
        </div>

        <div class="flex-1 overflow-y-auto p-4 space-y-2" id="skill-list">
            <!-- Rendered via JS -->
        </div>
    </aside>

    <!-- Main Content: Skill Details -->
    <main class="flex-1 h-2/3 md:h-full bg-black overflow-y-auto p-6 md:p-12 relative">
        <div id="welcome-state" class="absolute inset-0 flex items-center justify-center flex-col text-neutral-600">
            <svg class="w-16 h-16 mb-4 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
            <p class="uppercase tracking-widest text-sm">Select a skill to view its capabilities</p>
        </div>

        <div id="detail-state" class="hidden max-w-4xl mx-auto">
            <div class="mb-8 pb-8 border-b border-neutral-800">
                <div class="flex items-center gap-3 mb-2">
                    <span class="px-2 py-1 text-[10px] uppercase tracking-wider bg-blue-500/10 text-blue-400 border border-blue-500/20 rounded" id="detail-package">Package</span>
                    <span class="text-xs text-neutral-500 font-mono" id="detail-id">ID</span>
                </div>
                <h1 class="text-3xl md:text-5xl font-bold tracking-tight text-white mb-4" id="detail-name">Skill Name</h1>
                <p class="text-lg text-neutral-400" id="detail-desc">Skill description</p>
                <p class="text-xs text-neutral-600 mt-4 font-mono select-all" id="detail-path">Path</p>
            </div>
            
            <div id="detail-content" class="markdown-body opacity-90">
                <!-- Markdown content injected here -->
            </div>
        </div>
    </main>

    <!-- Load the dynamically generated data file -->
    <script src="skills-data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const listEl = document.getElementById('skill-list');
            const searchEl = document.getElementById('search-bar');
            
            // Check if data loaded correctly
            let skills = window.SKILLS_DATA || [];
            
            // Sort alphabetically
            skills.sort((a, b) => a.name.localeCompare(b.name));
            
            document.getElementById('skill-count').textContent = `${skills.length} Capabilities Loaded`;

            function renderList(filter = '') {
                listEl.innerHTML = '';
                const filtered = skills.filter(s => 
                    s.name.toLowerCase().includes(filter.toLowerCase()) || 
                    s.description.toLowerCase().includes(filter.toLowerCase()) ||
                    s.id.toLowerCase().includes(filter.toLowerCase())
                );
                
                if (filtered.length === 0) {
                    listEl.innerHTML = '<p class="text-neutral-500 text-sm text-center py-4">No skills match your search.</p>';
                    return;
                }

                filtered.forEach(skill => {
                    const btn = document.createElement('button');
                    btn.className = "w-full text-left p-3 hover:bg-neutral-900 border border-transparent hover:border-neutral-800 transition-all group focus:outline-none focus:bg-neutral-900 focus:border-blue-500/50";
                    btn.innerHTML = `
                        <div class="flex justify-between items-start">
                            <h3 class="font-medium text-sm text-neutral-200 group-hover:text-blue-400 transition-colors">${skill.name || skill.id}</h3>
                            <span class="text-[9px] uppercase tracking-widest text-neutral-600 bg-neutral-900 px-1 rounded">${skill.package}</span>
                        </div>
                        <p class="text-xs text-neutral-500 mt-1 line-clamp-2 leading-relaxed">${skill.description}</p>
                    `;
                    btn.onclick = () => renderDetail(skill);
                    listEl.appendChild(btn);
                });
            }

            function renderDetail(skill) {
                document.getElementById('welcome-state').classList.add('hidden');
                document.getElementById('detail-state').classList.remove('hidden');
                
                document.getElementById('detail-name').textContent = skill.name || skill.id;
                document.getElementById('detail-desc').textContent = skill.description;
                document.getElementById('detail-package').textContent = skill.package;
                document.getElementById('detail-id').textContent = skill.id;
                document.getElementById('detail-path').textContent = skill.path;
                
                // Strip the YAML frontmatter before rendering the markdown
                let mdContent = skill.content;
                const frontmatterMatch = mdContent.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n/);
                if (frontmatterMatch) {
                    mdContent = mdContent.replace(frontmatterMatch[0], '');
                }

                document.getElementById('detail-content').innerHTML = marked.parse(mdContent);
            }

            // Search filtering
            searchEl.addEventListener('input', (e) => {
                renderList(e.target.value);
            });

            // Initial render
            if (skills.length > 0) {
                renderList();
            } else {
                listEl.innerHTML = `
                    <div class="p-4 border border-red-900/50 bg-red-950/20 rounded text-red-400 text-sm">
                        <p class="font-bold mb-2">No skills data found.</p>
                        <p>Please double-click <code>Open Skills Dashboard.bat</code> to extract the raw skill data from your global npm registry before viewing this page.</p>
                    </div>
                `;
            }
        });
    </script>
</body>
</html>
